<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>成绩管理</title>
</head>
<body class="hold-transition skin-black sidebar-mini">
    <div th:replace="common/fragment :: link"></div>
    <div class="wrapper">
        <div th:replace="common/fragment :: navbar"></div>
        <div th:replace="common/fragment :: menu"></div>
        <div class="content-wrapper">
            <section class="content-header">
                <h1>成绩管理</h1>
            </section>
            <section class="content">
                <div class="box">
                    <form class="form-inline" id="searchForm" action="/score/list" method="post">
                        <input type="hidden" name="currentPage" id="currentPage" value="1">
                        <div class="form-group" style="margin: 10px">
                            <input type="text" class="form-control" name="studentName" placeholder="学生姓名" th:value="${query?.studentName}">
                        </div>
                        <div class="form-group" style="margin: 10px">
                            <input type="text" class="form-control" name="courseName" placeholder="课程名称" th:value="${query?.courseName}">
                        </div>
                        <div class="form-group" style="margin: 10px">
                            <input type="number" class="form-control" name="minScore" placeholder="最低分数" th:value="${query?.minScore}">
                        </div>
                        <div class="form-group" style="margin: 10px">
                            <input type="number" class="form-control" name="maxScore" placeholder="最高分数" th:value="${query?.maxScore}">
                        </div>
                        <button type="submit" class="btn btn-primary" style="margin: 10px">
                            <span class="glyphicon glyphicon-search"></span> 查询
                        </button>
                        <a href="#" class="btn btn-success btn-input" style="margin: 10px">
                            <span class="glyphicon glyphicon-plus"></span> 添加
                        </a>
                    </form>
                    <div class="box-body table-responsive ">
                        <table class="table table-hover table-bordered table-striped">
                            <thead>
                            <tr>
                                <th>编号</th>
                                <th>学生姓名</th>
                                <th>课程名称</th>
                                <th>成绩</th>
                                <th>考试类型</th>
                                <th>考试日期</th>
                                <th>操作</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="score,stat:${pageInfo.list}">
                                <td th:text="${stat.count}">1</td>
                                <td th:text="${score.studentName}">张三</td>
                                <td th:text="${score.courseName}">语文</td>
                                <td th:text="${score.score}">95</td>
                                <td th:text="${score.examType}">期中考试</td>
                                <td th:text="${score.examDate}">2024-04-15</td>
                                <td>
                                    <a href="#" class="btn btn-info btn-xs btn-input" th:data-json="${score.json}">
                                        <span class="glyphicon glyphicon-pencil"></span> 编辑
                                    </a>
                                    <a class="btn btn-danger btn-xs btn-delete" th:data-url="|/score/delete?id=${score.id}|">
                                        <span class="glyphicon glyphicon-trash"></span> 删除
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                        <div th:replace="common/fragment :: page"></div>
                    </div>
                </div>
            </section>
        </div>
        <div th:replace="common/fragment :: footer"></div>
    </div>
    <div class="modal fade" tabindex="-1" role="dialog" id="scoreDialog">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                    <h4 class="modal-title">成绩编辑</h4>
                </div>
                <form action="/score/saveOrUpdate" method="post">
                    <input type="hidden" name="id" id="id">
                    <div class="modal-body">
                        <div class="form-group">
                            <label for="studentId">学生</label>
                            <select class="form-control" name="studentId" id="studentId">
                                <option value="">请选择学生</option>
                                <option th:each="student:${students}" th:value="${student.id}" th:text="${student.name}"></option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="courseId">课程</label>
                            <select class="form-control" name="courseId" id="courseId">
                                <option value="">请选择课程</option>
                                <option th:each="course:${courses}" th:value="${course.id}" th:text="${course.name}"></option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="score">成绩</label>
                            <input type="number" class="form-control" name="score" id="score" placeholder="0-100">
                        </div>
                        <div class="form-group">
                            <label for="examType">考试类型</label>
                            <select class="form-control" name="examType" id="examType">
                                <option value="">请选择类型</option>
                                <option value="期中考试">期中考试</option>
                                <option value="期末考试">期末考试</option>
                                <option value="月考">月考</option>
                                <option value="随堂测验">随堂测验</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="examDate">考试日期</label>
                            <input type="date" class="form-control" name="examDate" id="examDate">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-primary">保存</button>
                        <button type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
        $(".btn-input").click(function(){
            $("#id").val("");
            $("#studentId").val("");
            $("#courseId").val("");
            $("#score").val("");
            $("#examType").val("");
            $("#examDate").val("");
            let data = $(this).data('json');
            if(data){
                $(".modal-title").html("成绩编辑");
                $("#id").val(data.id);
                $("#studentId").val(data.studentId);
                $("#courseId").val(data.courseId);
                $("#score").val(data.score);
                $("#examType").val(data.examType);
                $("#examDate").val(data.examDate);
            } else {
                $(".modal-title").html("成绩新增");
            }
            $("#scoreDialog").modal(true);
        });

        $(".btn-delete").click(function(e){
            e.preventDefault();
            var url = $(this).data('url');
            if(confirm('您确定要删除吗？此操作不可撤销!')) {
                location.href = url;
            }
        });
    </script>
</body>
</html>
