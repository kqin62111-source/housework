<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>课程表统计报表</title>
</head>
<body class="hold-transition skin-black sidebar-mini">
    <div th:replace="common/fragment :: link"></div>
    <div class="wrapper">
        <div th:replace="common/fragment :: navbar"></div>
        <div th:replace="common/fragment :: menu"></div>
        <div class="content-wrapper">
            <section class="content-header">
                <h1>课程表统计报表</h1>
            </section>
            <section class="content">
                <div class="box">
                    <form class="form-inline" id="searchForm" action="/report/scheduleReport" method="post">
                        <input type="hidden" name="currentPage" id="currentPage" value="1">
                        <div class="form-group" style="margin: 10px">
                            <input type="text" class="form-control" name="className" placeholder="班级名称" th:value="${query?.className}">
                        </div>
                        <div class="form-group" style="margin: 10px">
                            <input type="text" class="form-control" name="teacherName" placeholder="教师姓名" th:value="${query?.teacherName}">
                        </div>
                        <div class="form-group" style="margin: 10px">
                            <select class="form-control" name="dayOfWeek">
                                <option value="">全部星期</option>
                                <option value="周一" th:selected="${query?.dayOfWeek == '周一'}">周一</option>
                                <option value="周二" th:selected="${query?.dayOfWeek == '周二'}">周二</option>
                                <option value="周三" th:selected="${query?.dayOfWeek == '周三'}">周三</option>
                                <option value="周四" th:selected="${query?.dayOfWeek == '周四'}">周四</option>
                                <option value="周五" th:selected="${query?.dayOfWeek == '周五'}">周五</option>
                                <option value="周六" th:selected="${query?.dayOfWeek == '周六'}">周六</option>
                                <option value="周日" th:selected="${query?.dayOfWeek == '周日'}">周日</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary" style="margin: 10px">
                            <span class="glyphicon glyphicon-search"></span> 查询
                        </button>
                    </form>
                </div>
                <div class="row">
                    <div class="col-lg-3 col-xs-6">
                        <div class="small-box bg-purple">
                            <div class="inner">
                                <h3 th:text="${totalSchedules}">0</h3>
                                <p>课程安排总数</p>
                            </div>
                            <div class="icon">
                                <i class="fa fa-calendar"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-3 col-xs-6">
                        <div class="small-box bg-blue">
                            <div class="inner">
                                <h3 th:text="${totalTeachers}">0</h3>
                                <p>授课教师数</p>
                            </div>
                            <div class="icon">
                                <i class="fa fa-user"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-3 col-xs-6">
                        <div class="small-box bg-green">
                            <div class="inner">
                                <h3 th:text="${totalClasses}">0</h3>
                                <p>班级数量</p>
                            </div>
                            <div class="icon">
                                <i class="fa fa-graduation-cap"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-3 col-xs-6">
                        <div class="small-box bg-yellow">
                            <div class="inner">
                                <h3 th:text="${totalCourses}">0</h3>
                                <p>课程种类</p>
                            </div>
                            <div class="icon">
                                <i class="fa fa-book"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="box">
                            <div class="box-header with-border">
                                <h3 class="box-title">各课程课时分布</h3>
                            </div>
                            <div class="box-body">
                                <table class="table table-hover table-bordered">
                                    <thead>
                                    <tr>
                                        <th>课程名称</th>
                                        <th>课时数</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="entry : ${courseCount}">
                                        <td th:text="${entry.key}">语文</td>
                                        <td th:text="${entry.value}">0</td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="box">
                            <div class="box-header with-border">
                                <h3 class="box-title">星期分布</h3>
                            </div>
                            <div class="box-body">
                                <table class="table table-hover table-bordered">
                                    <thead>
                                    <tr>
                                        <th>星期</th>
                                        <th>课程数</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="item : ${dayDetailList}">
                                        <td th:text="${item.day}">星期一</td>
                                        <td th:text="${item.count}">0</td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="box">
                    <div class="box-header with-border">
                        <h3 class="box-title">教师授课量统计（按课时排序）</h3>
                    </div>
                    <div class="box-body">
                        <table class="table table-hover table-bordered">
                            <thead>
                            <tr>
                                <th>排名</th>
                                <th>教师姓名</th>
                                <th>授课节数</th>
                                <th>占比</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="item, stat : ${teacherDetailList}">
                                <td th:text="${stat.count}">1</td>
                                <td th:text="${item.teacherName}">张老师</td>
                                <td th:text="${item.periods}">0</td>
                                <td th:text="${item.percentage + '%'}">0%</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="box">
                    <div class="box-header with-border">
                        <h3 class="box-title">各班课程数量</h3>
                    </div>
                    <div class="box-body">
                        <table class="table table-hover table-bordered">
                            <thead>
                            <tr>
                                <th>班级名称</th>
                                <th>课程数</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="entry : ${classCount}">
                                <td th:text="${entry.key}">初一1班</td>
                                <td th:text="${entry.value}">0</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
        <div th:replace="common/fragment :: footer"></div>
    </div>
</body>
</html>
