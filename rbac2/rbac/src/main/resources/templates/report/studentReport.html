<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>学生统计报表</title>
</head>
<body class="hold-transition skin-black sidebar-mini">
    <div th:replace="common/fragment :: link"></div>
    <div class="wrapper">
        <div th:replace="common/fragment :: navbar"></div>
        <div th:replace="common/fragment :: menu"></div>
        <div class="content-wrapper">
            <section class="content-header">
                <h1>学生统计报表</h1>
            </section>
            <section class="content">
                <div class="box">
                    <form class="form-inline" id="searchForm" action="/report/studentReport" method="post">
                        <input type="hidden" name="currentPage" id="currentPage" value="1">
                        <div class="form-group" style="margin: 10px">
                            <select class="form-control" name="grade">
                                <option value="">全部年级</option>
                                <option th:each="grade:${grades}" th:value="${grade.name}" th:selected="${query?.grade == grade.name}" th:text="${grade.name}"></option>
                            </select>
                        </div>
                        <div class="form-group" style="margin: 10px">
                            <input type="text" class="form-control" name="clazzName" placeholder="班级名称" th:value="${query?.clazzName}">
                        </div>
                        <button type="submit" class="btn btn-primary" style="margin: 10px">
                            <span class="glyphicon glyphicon-search"></span> 查询
                        </button>
                    </form>
                </div>
                <div class="row">
                    <div class="col-lg-3 col-xs-6">
                        <div class="small-box bg-aqua">
                            <div class="inner">
                                <h3 th:text="${totalStudents}">0</h3>
                                <p>学生总数</p>
                            </div>
                            <div class="icon">
                                <i class="fa fa-users"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-3 col-xs-6">
                        <div class="small-box bg-blue">
                            <div class="inner">
                                <h3 th:text="${maleCount}">0</h3>
                                <p>男生人数</p>
                            </div>
                            <div class="icon">
                                <i class="fa fa-user"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-3 col-xs-6">
                        <div class="small-box bg-pink">
                            <div class="inner">
                                <h3 th:text="${femaleCount}">0</h3>
                                <p>女生人数</p>
                            </div>
                            <div class="icon">
                                <i class="fa fa-user"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-3 col-xs-6">
                        <div class="small-box bg-green">
                            <div class="inner">
                                <h3 th:text="${avgAge}">0</h3>
                                <p>平均年龄</p>
                            </div>
                            <div class="icon">
                                <i class="fa fa-bar-chart"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="box">
                            <div class="box-header with-border">
                                <h3 class="box-title">性别分布</h3>
                            </div>
                            <div class="box-body">
                                <table class="table table-hover table-bordered">
                                    <thead>
                                    <tr>
                                        <th>性别</th>
                                        <th>人数</th>
                                        <th>占比</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr>
                                        <td>男</td>
                                        <td th:text="${maleCount}">0</td>
                                        <td th:text="${malePercentage} + '%'">0%</td>
                                    </tr>
                                    <tr>
                                        <td>女</td>
                                        <td th:text="${femaleCount}">0</td>
                                        <td th:text="${femalePercentage} + '%'">0%</td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="box">
                            <div class="box-header with-border">
                                <h3 class="box-title">年龄统计</h3>
                            </div>
                            <div class="box-body">
                                <table class="table table-hover table-bordered">
                                    <thead>
                                    <tr>
                                        <th>统计项</th>
                                        <th>数值</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr>
                                        <td>平均年龄</td>
                                        <td th:text="${avgAge}">0</td>
                                    </tr>
                                    <tr>
                                        <td>最小年龄</td>
                                        <td th:text="${minAge}">0</td>
                                    </tr>
                                    <tr>
                                        <td>最大年龄</td>
                                        <td th:text="${maxAge}">0</td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="box">
                    <div class="box-header with-border">
                        <h3 class="box-title">年级分布详情</h3>
                    </div>
                    <div class="box-body">
                        <table class="table table-hover table-bordered">
                            <thead>
                            <tr>
                                <th>年级</th>
                                <th>总人数</th>
                                <th>男生数</th>
                                <th>女生数</th>
                                <th>占比</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="item : ${gradeDetailList}">
                                <td th:text="${item.grade}">初一</td>
                                <td th:text="${item.count}">0</td>
                                <td th:text="${item.male}">0</td>
                                <td th:text="${item.female}">0</td>
                                <td th:text="${item.percentage} + '%'">0%</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="box">
                    <div class="box-header with-border">
                        <h3 class="box-title">班级分布</h3>
                    </div>
                    <div class="box-body">
                        <table class="table table-hover table-bordered">
                            <thead>
                            <tr>
                                <th>班级</th>
                                <th>人数</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="entry : ${classCount}">
                                <td th:text="${entry.key}">初一1班</td>
                                <td th:text="${entry.value}">0</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
        <div th:replace="common/fragment :: footer"></div>
    </div>
</body>
</html>
