<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>员工统计报表</title>
</head>
<body class="hold-transition skin-black sidebar-mini">
    <div th:replace="common/fragment :: link"></div>
    <div class="wrapper">
        <div th:replace="common/fragment :: navbar"></div>
        <div th:replace="common/fragment :: menu"></div>
        <div class="content-wrapper">
            <section class="content-header">
                <h1>员工统计报表</h1>
            </section>
            <section class="content">
                <div class="box">
                    <form class="form-inline" id="searchForm" action="/report/employeeReport" method="post">
                        <input type="hidden" name="currentPage" id="currentPage" value="1">
                        <div class="form-group" style="margin: 10px">
                            <input type="text" class="form-control" name="departmentName" placeholder="部门名称" th:value="${query?.departmentName}">
                        </div>
                        <div class="form-group" style="margin: 10px">
                            <input type="text" class="form-control" name="position" placeholder="职位" th:value="${query?.position}">
                        </div>
                        <button type="submit" class="btn btn-primary" style="margin: 10px">
                            <span class="glyphicon glyphicon-search"></span> 查询
                        </button>
                    </form>
                </div>
                <div class="row">
                    <div class="col-lg-3 col-xs-6">
                        <div class="small-box bg-blue">
                            <div class="inner">
                                <h3 th:text="${totalEmployees}">0</h3>
                                <p>员工总数</p>
                            </div>
                            <div class="icon">
                                <i class="fa fa-users"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-3 col-xs-6">
                        <div class="small-box bg-green">
                            <div class="inner">
                                <h3 th:text="${departmentCount.size()}">0</h3>
                                <p>部门数量</p>
                            </div>
                            <div class="icon">
                                <i class="fa fa-building"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-3 col-xs-6">
                        <div class="small-box bg-purple">
                            <div class="inner">
                                <h3 th:text="${positionCount.size()}">0</h3>
                                <p>职位种类</p>
                            </div>
                            <div class="icon">
                                <i class="fa fa-briefcase"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="box">
                            <div class="box-header with-border">
                                <h3 class="box-title">职位分布</h3>
                            </div>
                            <div class="box-body">
                                <table class="table table-hover table-bordered">
                                    <thead>
                                    <tr>
                                        <th>职位</th>
                                        <th>人数</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="entry : ${positionCount}">
                                        <td th:text="${entry.key}">教师</td>
                                        <td th:text="${entry.value}">0</td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="box">
                            <div class="box-header with-border">
                                <h3 class="box-title">部门人数预览</h3>
                            </div>
                            <div class="box-body">
                                <table class="table table-hover table-bordered">
                                    <thead>
                                    <tr>
                                        <th>部门名称</th>
                                        <th>人数</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="entry : ${departmentCount}">
                                        <td th:text="${entry.key}">教务处</td>
                                        <td th:text="${entry.value}">0</td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="box">
                    <div class="box-header with-border">
                        <h3 class="box-title">部门分布详情（按人数排序）</h3>
                    </div>
                    <div class="box-body">
                        <table class="table table-hover table-bordered">
                            <thead>
                            <tr>
                                <th>排名</th>
                                <th>部门名称</th>
                                <th>人数</th>
                                <th>占比</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="item, stat : ${departmentDetailList}">
                                <td th:text="${stat.count}">1</td>
                                <td th:text="${item.departmentName}">教务处</td>
                                <td th:text="${item.count}">0</td>
                                <td th:text="${item.percentage + '%'}">0%</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
        <div th:replace="common/fragment :: footer"></div>
    </div>
</body>
</html>
