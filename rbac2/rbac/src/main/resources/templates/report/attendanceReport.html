<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>考勤报表</title>
</head>
<body class="hold-transition skin-black sidebar-mini">
    <div th:replace="common/fragment :: link"></div>
    <div class="wrapper">
        <div th:replace="common/fragment :: navbar"></div>
        <div th:replace="common/fragment :: menu"></div>
        <div class="content-wrapper">
            <section class="content-header">
                <h1>考勤报表</h1>
            </section>
            <section class="content">
                <div class="box">
                    <form class="form-inline" id="searchForm" action="/report/attendanceReport" method="post">
                        <input type="hidden" name="currentPage" id="currentPage" value="1">
                        <div class="form-group" style="margin: 10px">
                            <input type="text" class="form-control" name="studentName" placeholder="学生姓名" th:value="${query?.studentName}">
                        </div>
                        <div class="form-group" style="margin: 10px">
                            <input type="date" class="form-control" name="startDate" th:value="${query?.startDate}">
                        </div>
                        <div class="form-group" style="margin: 10px">
                            <input type="date" class="form-control" name="endDate" th:value="${query?.endDate}">
                        </div>
                        <button type="submit" class="btn btn-primary" style="margin: 10px">
                            <span class="glyphicon glyphicon-search"></span> 查询
                        </button>
                    </form>
                </div>
                <div class="row">
                    <div class="col-lg-3 col-xs-6">
                        <div class="small-box bg-yellow">
                            <div class="inner">
                                <h3 th:text="${totalAttendances}">0</h3>
                                <p>考勤记录数</p>
                            </div>
                            <div class="icon">
                                <i class="fa fa-clock-o"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-3 col-xs-6">
                        <div class="small-box bg-green">
                            <div class="inner">
                                <h3 th:text="${presentCount}">0</h3>
                                <p>出勤人数</p>
                            </div>
                            <div class="icon">
                                <i class="fa fa-check-circle"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-3 col-xs-6">
                        <div class="small-box bg-red">
                            <div class="inner">
                                <h3 th:text="${absentCount}">0</h3>
                                <p>缺勤人数</p>
                            </div>
                            <div class="icon">
                                <i class="fa fa-times-circle"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-3 col-xs-6">
                        <div class="small-box bg-orange">
                            <div class="inner">
                                <h3 th:text="${lateCount}">0</h3>
                                <p>迟到人数</p>
                            </div>
                            <div class="icon">
                                <i class="fa fa-exclamation-circle"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="box">
                            <div class="box-header with-border">
                                <h3 class="box-title">考勤状态统计</h3>
                            </div>
                            <div class="box-body">
                                <table class="table table-hover table-bordered">
                                    <thead>
                                    <tr>
                                        <th>状态</th>
                                        <th>数量</th>
                                        <th>占比</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr>
                                        <td>出勤</td>
                                        <td th:text="${presentCount}">0</td>
                                        <td th:text="${attendanceRate + '%'}">0%</td>
                                    </tr>
                                    <tr>
                                        <td>缺勤</td>
                                        <td th:text="${absentCount}">0</td>
                                        <td th:text="${absentRate + '%'}">0%</td>
                                    </tr>
                                    <tr>
                                        <td>迟到</td>
                                        <td th:text="${lateCount}">0</td>
                                        <td th:text="${lateRate + '%'}">0%</td>
                                    </tr>
                                    <tr>
                                        <td>请假</td>
                                        <td th:text="${leaveCount}">0</td>
                                        <td th:text="${leaveRate + '%'}">0%</td>
                                    </tr>
                                    <tr>
                                        <td>早退</td>
                                        <td th:text="${earlyLeaveCount}">0</td>
                                        <td>--</td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="box">
                            <div class="box-header with-border">
                                <h3 class="box-title">日期统计</h3>
                            </div>
                            <div class="box-body">
                                <table class="table table-hover table-bordered">
                                    <thead>
                                    <tr>
                                        <th>日期</th>
                                        <th>考勤次数</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="item : ${dateDetailList}">
                                        <td th:text="${item.date}">2024-01-01</td>
                                        <td th:text="${item.count}">0</td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="box">
                    <div class="box-header with-border">
                        <h3 class="box-title">学生考勤详情（按出勤率排序）</h3>
                    </div>
                    <div class="box-body">
                        <table class="table table-hover table-bordered">
                            <thead>
                            <tr>
                                <th>排名</th>
                                <th>学生姓名</th>
                                <th>考勤总次数</th>
                                <th>出勤</th>
                                <th>缺勤</th>
                                <th>迟到</th>
                                <th>请假</th>
                                <th>出勤率</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="item, stat : ${studentAttendanceList}">
                                <td th:text="${stat.count}">1</td>
                                <td th:text="${item.studentName}">学生</td>
                                <td th:text="${item.total}">0</td>
                                <td th:text="${item.present}">0</td>
                                <td th:text="${item.absent}">0</td>
                                <td th:text="${item.late}">0</td>
                                <td th:text="${item.leave}">0</td>
                                <td th:text="${item.rate + '%'}">0%</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
        <div th:replace="common/fragment :: footer"></div>
    </div>
</body>
</html>
