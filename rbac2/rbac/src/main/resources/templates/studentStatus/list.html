<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>学籍管理</title>
</head>
<body class="hold-transition skin-black sidebar-mini">
    <div th:replace="common/fragment :: link"></div>
    <div class="wrapper">
        <div th:replace="common/fragment :: navbar"></div>
        <div th:replace="common/fragment :: menu"></div>
        <div class="content-wrapper">
            <section class="content-header">
                <h1>学籍管理</h1>
            </section>
            <section class="content">
                <div class="box">
                    <form class="form-inline" id="searchForm" action="/studentStatus/list" method="post">
                        <input type="hidden" name="currentPage" id="currentPage" value="1">
                        <div class="form-group" style="margin: 10px">
                            <input type="text" class="form-control" name="studentName" placeholder="学生姓名" th:value="${query?.studentName}">
                        </div>
                        <div class="form-group" style="margin: 10px">
                            <select class="form-control" name="status">
                                <option value="">状态</option>
                                <option value="入学" th:selected="${query?.status == '入学'}">入学</option>
                                <option value="转学" th:selected="${query?.status == '转学'}">转学</option>
                                <option value="毕业" th:selected="${query?.status == '毕业'}">毕业</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin: 10px">
                            <input type="text" class="form-control" name="operator" placeholder="操作员" th:value="${query?.operator}">
                        </div>
                        <button type="submit" class="btn btn-primary" style="margin: 10px">
                            <span class="glyphicon glyphicon-search"></span> 查询
                        </button>
                        <a href="#" class="btn btn-success btn-input" style="margin: 10px">
                            <span class="glyphicon glyphicon-plus"></span> 添加
                        </a>
                    </form>
                    <div class="box-body table-responsive ">
                        <table class="table table-hover table-bordered table-striped">
                            <thead>
                            <tr>
                                <th>编号</th>
                                <th>学生姓名</th>
                                <th>状态</th>
                                <th>原因</th>
                                <th>操作日期</th>
                                <th>操作员</th>
                                <th>操作</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="status,stat:${pageInfo.list}">
                                <td th:text="${stat.count}">1</td>
                                <td th:text="${status.studentName}">张三</td>
                                <td th:text="${status.status}">入学</td>
                                <td th:text="${status.reason}">新生入学</td>
                                <td th:text="${status.operateDate}">2024-09-01</td>
                                <td th:text="${status.operator}">管理员</td>
                                <td>
                                    <a href="#" class="btn btn-info btn-xs btn-input" th:data-json="${status.json}">
                                        <span class="glyphicon glyphicon-pencil"></span> 编辑
                                    </a>
                                    <a class="btn btn-danger btn-xs btn-delete" th:data-url="|/studentStatus/delete?id=${status.id}|">
                                        <span class="glyphicon glyphicon-trash"></span> 删除
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                        <div th:replace="common/fragment :: page"></div>
                    </div>
                </div>
            </section>
        </div>
        <div th:replace="common/fragment :: footer"></div>
    </div>
    <div class="modal fade" tabindex="-1" role="dialog" id="statusDialog">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                    <h4 class="modal-title">学籍状态编辑</h4>
                </div>
                <form action="/studentStatus/saveOrUpdate" method="post">
                    <input type="hidden" name="id" id="id">
                    <div class="modal-body">
                        <div class="form-group">
                            <label for="studentId">学生</label>
                            <select class="form-control" name="studentId" id="studentId">
                                <option value="">请选择学生</option>
                                <option th:each="student:${students}" th:value="${student.id}" th:text="${student.name}"></option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="status">状态</label>
                            <select class="form-control" name="status" id="status">
                                <option value="">请选择状态</option>
                                <option value="入学">入学</option>
                                <option value="转学">转学</option>
                                <option value="毕业">毕业</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="reason">原因</label>
                            <input type="text" class="form-control" name="reason" id="reason" placeholder="原因">
                        </div>
                        <div class="form-group">
                            <label for="operateDate">操作日期</label>
                            <input type="date" class="form-control" name="operateDate" id="operateDate">
                        </div>
                        <div class="form-group">
                            <label for="operator">操作员</label>
                            <input type="text" class="form-control" name="operator" id="operator" placeholder="操作员">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-primary">保存</button>
                        <button type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
        $(".btn-input").click(function(){
            $("#id").val("");
            $("#studentId").val("");
            $("#status").val("");
            $("#reason").val("");
            $("#operateDate").val("");
            $("#operator").val("");
            let data = $(this).data('json');
            if(data){
                $(".modal-title").html("学籍状态编辑");
                $("#id").val(data.id);
                $("#studentId").val(data.studentId);
                $("#status").val(data.status);
                $("#reason").val(data.reason);
                $("#operateDate").val(data.operateDate);
                $("#operator").val(data.operator);
            } else {
                $(".modal-title").html("学籍状态新增");
            }
            $("#statusDialog").modal(true);
        });

        $(".btn-delete").click(function(e){
            e.preventDefault();
            var url = $(this).data('url');
            if(confirm('您确定要删除吗？此操作不可撤销!')) {
                location.href = url;
            }
        });
    </script>
</body>
</html>
