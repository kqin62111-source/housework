<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>权限管理</title>
</head>
<body class="hold-transition skin-black sidebar-mini">
    <div th:replace="common/fragment :: link"></div>
    <div class="wrapper">
        <div th:replace="common/fragment :: navbar"></div>
        <div th:replace="common/fragment :: menu"></div>
        <div class="content-wrapper">
            <section class="content-header">
                <h1>权限管理</h1>
            </section>
            <section class="content">
                <div class="box">
                    <form class="form-inline" id="searchForm" action="/permission/list" method="post">
                        <input type="hidden" name="currentPage" id="currentPage" value="1">
                        <div class="form-group" style="margin: 10px">
                            <input type="text" class="form-control" name="name" placeholder="权限名称" th:value="${query?.name}">
                        </div>
                        <div class="form-group" style="margin: 10px">
                            <input type="text" class="form-control" name="sn" placeholder="权限编码" th:value="${query?.sn}">
                        </div>
                        <div class="form-group" style="margin: 10px">
                            <input type="text" class="form-control" name="url" placeholder="URL" th:value="${query?.url}">
                        </div>
                        <button type="submit" class="btn btn-primary" style="margin: 10px">
                            <span class="glyphicon glyphicon-search"></span> 查询
                        </button>
                        <a href="#" class="btn btn-success btn-input" style="margin: 10px">
                            <span class="glyphicon glyphicon-plus"></span> 添加
                        </a>
                    </form>
                    <div class="box-body table-responsive ">
                        <table class="table table-hover table-bordered table-striped">
                            <thead>
                            <tr>
                                <th>编号</th>
                                <th>权限名称</th>
                                <th>权限编码</th>
                                <th>URL</th>
                                <th>图标</th>
                                <th>类型</th>
                                <th>操作</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="permission,stat:${pageInfo.list}">
                                <td th:text="${stat.count}">1</td>
                                <td th:text="${permission.name}">学生管理</td>
                                <td th:text="${permission.sn}">STUDENT</td>
                                <td th:text="${permission.url}">/student/list</td>
                                <td th:text="${permission.icon}">fa-users</td>
                                <td th:text="${permission.type == 1 ? '菜单' : '按钮'}">菜单</td>
                                <td>
                                    <a href="#" class="btn btn-info btn-xs btn-input" th:data-json="${permission.json}">
                                        <span class="glyphicon glyphicon-pencil"></span> 编辑
                                    </a>
                                    <a class="btn btn-danger btn-xs btn-delete" th:data-url="|/permission/delete?id=${permission.id}|">
                                        <span class="glyphicon glyphicon-trash"></span> 删除
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                        <div th:replace="common/fragment :: page"></div>
                    </div>
                </div>
            </section>
        </div>
        <div th:replace="common/fragment :: footer"></div>
    </div>
    <div class="modal fade" tabindex="-1" role="dialog" id="permissionDialog">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                    <h4 class="modal-title">权限编辑</h4>
                </div>
                <form action="/permission/saveOrUpdate" method="post">
                    <input type="hidden" name="id" id="id">
                    <div class="modal-body">
                        <div class="form-group">
                            <label for="name">权限名称</label>
                            <input type="text" class="form-control" name="name" id="name" placeholder="权限名称">
                        </div>
                        <div class="form-group">
                            <label for="sn">权限编码</label>
                            <input type="text" class="form-control" name="sn" id="sn" placeholder="如：STUDENT">
                        </div>
                        <div class="form-group">
                            <label for="url">URL</label>
                            <input type="text" class="form-control" name="url" id="url" placeholder="如：/student/list">
                        </div>
                        <div class="form-group">
                            <label for="icon">图标</label>
                            <input type="text" class="form-control" name="icon" id="icon" placeholder="如：fa-users">
                        </div>
                        <div class="form-group">
                            <label for="type">类型</label>
                            <select class="form-control" name="type" id="type">
                                <option value="1">菜单</option>
                                <option value="2">按钮</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-primary">保存</button>
                        <button type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
        $(".btn-input").click(function(){
            $("#id").val("");
            $("#name").val("");
            $("#sn").val("");
            $("#url").val("");
            $("#icon").val("");
            $("#type").val("1");
            let data = $(this).data('json');
            if(data){
                $(".modal-title").html("权限编辑");
                $("#id").val(data.id);
                $("#name").val(data.name);
                $("#sn").val(data.sn);
                $("#url").val(data.url);
                $("#icon").val(data.icon);
                $("#type").val(data.type);
            } else {
                $(".modal-title").html("权限新增");
            }
            $("#permissionDialog").modal(true);
        });

        $(".btn-delete").click(function(e){
            e.preventDefault();
            var url = $(this).data('url');
            if(confirm('您确定要删除吗？此操作不可撤销!')) {
                location.href = url;
            }
        });
    </script>
</body>
</html>
