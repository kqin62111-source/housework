<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>班级管理</title>
</head>
<body class="hold-transition skin-black sidebar-mini">
    <div th:replace="common/fragment :: link"></div>
    <div class="wrapper">
        <div th:replace="common/fragment :: navbar"></div>
        <div th:replace="common/fragment :: menu"></div>
        <div class="content-wrapper">
            <section class="content-header">
                <h1>班级管理</h1>
            </section>
            <section class="content">
                <div class="box">
                    <form class="form-inline" id="searchForm" action="/class/list" method="post">
                        <input type="hidden" name="currentPage" id="currentPage" value="1">
                        <div class="form-group" style="margin: 10px">
                            <input type="text" class="form-control" name="name" placeholder="班级名称" th:value="${query.name}">
                        </div>
                        <div class="form-group" style="margin: 10px">
                            <input type="text" class="form-control" name="grade" placeholder="所属年级" th:value="${query.grade}">
                        </div>
                        <button type="submit" class="btn btn-primary" style="margin: 10px">
                            <span class="glyphicon glyphicon-search"></span> 查询
                        </button>
                        <a href="#" class="btn btn-success btn-input" style="margin: 10px">
                            <span class="glyphicon glyphicon-plus"></span> 添加
                        </a>
                    </form>
                    <div class="box-body table-responsive ">
                        <table class="table table-hover table-bordered table-striped">
                            <thead>
                            <tr>
                                <th>编号</th>
                                <th>班级名称</th>
                                <th>所属年级</th>
                                <th>操作</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="clazz,stat:${pageInfo.list}">
                                <td th:text="${stat.count}">1</td>
                                <td th:text="${clazz.name}">初一(1)班</td>
                                <td th:text="${clazz.gradeName}">初一</td>
                                <td>
                                    <a href="#" class="btn btn-info btn-xs btn-input" th:data-json="${clazz.json}">
                                        <span class="glyphicon glyphicon-pencil"></span> 编辑
                                    </a>
                                    <a class="btn btn-danger btn-xs btn-delete" th:data-url="|/class/delete?id=${clazz.id}|">
                                        <span class="glyphicon glyphicon-trash"></span> 删除
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                        <div th:replace="common/fragment :: page"></div>
                    </div>
                </div>
            </section>
        </div>
        <div th:replace="common/fragment :: footer"></div>
    </div>
    <div class="modal fade" tabindex="-1" role="dialog" id="classDialog">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                    <h4 class="modal-title">班级编辑</h4>
                </div>
                <form action="/class/saveOrUpdate" method="post">
                    <input type="hidden" name="id" id="id">
                    <div class="modal-body">
                        <div class="form-group">
                            <label for="name">班级名称</label>
                            <input type="text" class="form-control" name="name" id="name" placeholder="如：初一(1)班">
                        </div>
                        <div class="form-group">
                            <label for="gradeId">所属年级</label>
                            <select class="form-control" name="gradeId" id="gradeId">
                                <option value="">请选择年级</option>
                                <option th:each="grade:${grades}" th:value="${grade.id}" th:text="${grade.name}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-primary">保存</button>
                        <button type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
        $(".btn-input").click(function(){
            $("#id").val("");
            $("#name").val("");
            $("#gradeId").val("");
            let data = $(this).data('json');
            if(data){
                $(".modal-title").html("班级编辑");
                $("#id").val(data.id);
                $("#name").val(data.name);
                $("#gradeId").val(data.gradeId);
            } else {
                $(".modal-title").html("班级新增");
            }
            $("#classDialog").modal(true);
        });

        $(".btn-delete").click(function(e){
            e.preventDefault();
            var url = $(this).data('url');
            if(confirm('您确定要删除吗？此操作不可撤销!')) {
                location.href = url;
            }
        });
    </script>
</body>
</html>
